<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="tweetkit-x — post, delete and read on X from Python and MCP using your own web session. No paid API.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0c"/>
      <stop offset="0.55" stop-color="#0d0f14"/>
      <stop offset="1" stop-color="#08090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 120) rotate(35) scale(520 360)">
      <stop stop-color="#1d9bf0" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1d9bf0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1050 320) rotate(-40) scale(460 320)">
      <stop stop-color="#7856ff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7856ff" stop-opacity="0"/>
    </radialGradient>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }
      .sans { font-family: -apple-system, "Segoe UI", Inter, Roboto, sans-serif; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1280" height="400" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="400" rx="20" fill="url(#glow)"/>
  <rect width="1280" height="400" rx="20" fill="url(#glow2)"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.035">
    <line x1="0" y1="100" x2="1280" y2="100"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
  </g>
  <rect x="1" y="1" width="1278" height="398" rx="19" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- wordmark -->
  <text x="72" y="150" class="mono" font-size="82" font-weight="700" fill="#e7e9ea" letter-spacing="-2">tweetkit<tspan fill="#1d9bf0">-x</tspan></text>

  <!-- blinking-cursor block after the wordmark -->
  <rect x="612" y="112" width="20" height="44" fill="#3fb950" opacity="0.9"/>

  <!-- tagline -->
  <text x="74" y="200" class="sans" font-size="27" fill="#aab2ba" font-weight="500">Post · delete · read on <tspan fill="#e7e9ea" font-weight="700">X (Twitter)</tspan> from <tspan fill="#e7e9ea" font-weight="700">Python</tspan> &amp; <tspan fill="#e7e9ea" font-weight="700">MCP</tspan></text>
  <text x="74" y="234" class="sans" font-size="21" fill="#71767b">Your own logged-in web session — <tspan fill="#3fb950" font-weight="600">no paid API</tspan>, no dev app, no OAuth.</text>

  <!-- terminal card -->
  <g transform="translate(74 268)">
    <rect width="1000" height="104" rx="12" fill="#111318" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="24" cy="22" r="6" fill="#ff5f57"/>
    <circle cx="46" cy="22" r="6" fill="#febc2e"/>
    <circle cx="68" cy="22" r="6" fill="#28c840"/>
    <text x="96" y="27" class="mono" font-size="13" fill="#565b63">tweetkit — zsh</text>
    <text x="24" y="62" class="mono" font-size="18" fill="#e7e9ea"><tspan fill="#3fb950">$</tspan> tweetkit post <tspan fill="#f0c674">"hello world"</tspan>  <tspan fill="#565b63">→ https://x.com/i/status/18…</tspan></text>
    <text x="24" y="88" class="mono" font-size="18" fill="#e7e9ea"><tspan fill="#3fb950">$</tspan> tweetkit search <tspan fill="#f0c674">"xmr|monero"</tspan> --regex   <tspan fill="#565b63"># then delete</tspan></text>
  </g>

  <!-- large official X logo, low-opacity watermark on the right -->
  <g transform="translate(1052 44) scale(7.1)" fill="#1d9bf0" opacity="0.16">
    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.65l-5.21-6.817-5.96 6.817H1.7l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
  </g>
</svg>
